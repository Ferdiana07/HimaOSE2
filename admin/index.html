<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – HIMAOSE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="./assets/admin.css" />
</head>
<body class="login-page">

  <div class="login-box">
    <div class="login-logo">
      <img src="../assets/images/logo/logo.png" alt="Logo HIMAOSE" />
    </div>
    <h2>Admin Panel</h2>
    <p class="login-sub">HIMAOSE UNDIP</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button id="btn-login">Masuk</button>
    <p id="error-msg"></p>
  </div>

  <script>
    const sb = window.supabase.createClient(
      "https://rfrsgveoykdmcyczbkko.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmcnNndmVveWtkbWN5Y3pia2tvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTU1MzgsImV4cCI6MjA4OTU3MTUzOH0.4wqRmCHZjVotig4nOrLTLw0tGpDmysYmOR9H8KLEoz8"
    );

    // Kalau sudah login langsung ke dashboard
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = "./dashboard.html";
    });

    document.getElementById("btn-login").addEventListener("click", async () => {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errMsg   = document.getElementById("error-msg");
      const btn      = document.getElementById("btn-login");

      if (!email || !password) {
        errMsg.textContent = "Email dan password wajib diisi.";
        return;
      }

      btn.textContent = "Memuat...";
      btn.disabled = true;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errMsg.textContent = "Login gagal: " + error.message;
        btn.textContent = "Masuk";
        btn.disabled = false;
      } else {
        window.location.href = "./dashboard.html";
      }
    });

    // Enter key untuk submit
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("btn-login").click();
    });
  </script>
</body>
</html>
